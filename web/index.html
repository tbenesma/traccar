<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Traccar Dev</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, sans-serif; margin: 2rem; }
      .card { max-width: 720px; padding: 1.5rem; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
      h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
      code { background: #f3f4f6; padding: 0.15rem 0.35rem; border-radius: 6px; }
      a { color: #2563eb; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .muted { color: #6b7280; }
      ul { line-height: 1.6; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Traccar Server (Dev)</h1>
      <p class="muted">This is a minimal placeholder UI for local development.</p>
      <ul>
        <li>API base: <code>/api</code></li>
        <li>Session endpoint: <code>/api/session</code></li>
        <li>Health endpoint: <code>/api/health</code></li>
      </ul>
      <p>Try logging in with a token via <code>GET /api/session?token=YOUR_TOKEN</code>.</p>
    </div>
  </body>
</html>
